<head>

</head>
<body style="background-color: #ecf0f5; margin: 0;">
    <div class="admin-layout">

        <div class="sidebar">
            <div class="sidebar-header">🎓 Course Boo</div>
    <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 ภาพรวมระบบ</a></li>
                <li><a href="course.html">📚 จัดการคอร์ส</a></li>
                <li><a href="instructor.html">👨‍🏫 จัดการผู้สอน</a></li>
                <li><a href="lesson.html">📝 จัดการบทเรียน</a></li>
                <li><a href="student.html">🎓 จัดการผู้เรียน</a></li>
                <li><a href="enrollment.html">🔗 การลงทะเบียน</a></li>
                <li><a href="progress.html">📈 ติดตามการเรียน</a></li>
                <li><a href="quiz.html">📋 แบบทดสอบ</a></li>
                <li class="active"><a href="quiz-results.html">🏆 คะแนนแบบทดสอบ</a></li>
                <li style="border-top: 1px solid #3d4f56;">
                    <a href="#" onclick="logout()">🚪 ออกจากระบบ</a>
    </li>
</ul>
        </div>

        <div class="main-content">
            <div class="header-section">
                <h1 style="margin: 0; font-size: 24px; padding-bottom: 20px;">
                    การลงทะเบียน <small style="color: #777; font-size: 15px; font-weight: normal;">จับคู่นักเรียนเข้ากับคอร์สเรียน</small>
                </h1>
            </div>

            <div style="display: flex; gap: 25px; align-items: flex-start;">

                <!-- ฟอร์มลงทะเบียน -->
                <div class="content-box" style="flex: 1;">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">📝 ลงทะเบียนเรียน</h3>

                    <div class="form-group">
                        <label>เลือกผู้เรียน (Student)</label>
                        <select class="form-control" name="student_id">
                            <option value="">-- กรุณาเลือกผู้เรียน --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>เลือกคอร์สเรียน (Course)</label>
                        <select class="form-control" name="course_id">
                            <option value="">-- กรุณาเลือกคอร์สเรียน --</option>
                        </select>
                    </div>

                    <div id="message" class="message"></div>

                    <div style="text-align: right; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                        <button onclick="submitData()" class="btn-submit">💾 บันทึกการลงทะเบียน</button>
                    </div>
                </div>

                <!-- รายชื่อผู้ลงทะเบียน -->
                <div class="content-box" style="flex: 2;">
                    <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">📋 รายชื่อผู้ลงทะเบียนทั้งหมด</h3>
                    <div id="enrollment-data"></div>
                </div>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
<script src="js/enrollment.js"></script>
<script>checkLogin('teacher')</script>
</body>
</html>
