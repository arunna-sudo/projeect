<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Course Boo</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-bg">

    <div class="login-box">

        <!-- Logo -->
        <div class="login-logo">
            <div class="icon">🎓</div>
            <h2>Course Boo</h2>
            <p>ระบบจัดการคอร์สออนไลน์</p>
        </div>

        <!-- ฟอร์ม — ใช้ form-group และ form-control จาก CSS เดิม -->
        <div class="form-group">
            <label>อีเมล</label>
            <input class="form-control" name="email" type="email" placeholder="กรอกอีเมล">
        </div>

        <div class="form-group">
            <label>รหัสผ่าน</label>
            <input class="form-control" name="password" type="password" placeholder="กรอกรหัสผ่าน">
        </div>

        <div id="message" class="message"></div>

        <!-- ปุ่ม — ใช้ btn-submit จาก CSS เดิม -->
        <button onclick="submitLogin()" class="btn-submit" style="width: 100%; padding: 12px; font-size: 16px;">
            🔐 เข้าสู่ระบบ
        </button>

        <!-- hint -->
        <div class="login-hint">
            <strong>👨‍🏫 ครู:</strong> teacher@school.com password 1234 <br>
            <strong>👨‍🎓 นักเรียน:</strong> เมลตัวเอง password 1234 <br>
            <strong>💡 ครูใหม่ / นักเรียนใหม่:</strong> ใช้ email ตัวเอง password 1234
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
