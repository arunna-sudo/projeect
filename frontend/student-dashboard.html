<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Boo</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="student-body">

    <!-- Student Navbar -->
    <nav class="s-nav">
        <div class="s-nav-logo">🎓 <span>Course Boo</span></div>
        <div class="s-nav-links">
            <a href="student-dashboard.html" class="s-nav-active">🏠 หน้าหลัก</a>
            <a href="student-courses.html">📚 คอร์สของฉัน</a>
            <a href="student-progress.html">📈 ความคืบหน้า</a>
            <a href="student-quiz.html">📝 แบบทดสอบ</a>
            
        </div>
        <button class="s-nav-logout" onclick="logout()">🚪 ออก</button>
    </nav>

    <!-- Main -->
    <div class="s-main">
        <!-- Welcome Banner — Skooldio style -->
        <div class="welcome-banner">
            <div class="welcome-banner-left">
                <div class="welcome-tag">✦ Course Boo · ระบบเรียนออนไลน์</div>
                <h2 class="welcome-name">👋 <span id="student-name"></span></h2>
                <p class="welcome-sub">เรียนรู้ได้ทุกที่ ไม่มีขีดจำกัด</p>
            </div>
            <div class="welcome-deco">🎓</div>
        </div>

            <!-- stat cards -->
            <div class="stat-grid">
                <div class="stat-card bg-blue">
                    <div>
                        <h3 id="count-enrolled">0</h3>
                        <p>คอร์สที่ลงทะเบียน</p>
                    </div>
                    <div class="stat-icon">📚</div>
                </div>
                <div class="stat-card bg-green">
                    <div>
                        <h3 id="count-completed">0</h3>
                        <p>บทเรียนที่เรียนจบ</p>
                    </div>
                    <div class="stat-icon">✅</div>
                </div>
                <div class="stat-card bg-orange">
                    <div>
                        <h3 id="count-inprogress">0</h3>
                        <p>บทเรียนที่กำลังเรียน</p>
                    </div>
                    <div class="stat-icon">⏳</div>
                </div>
            </div>

            <!-- คอร์สที่ลงทะเบียน -->
            <h3 style="margin-top: 30px; margin-bottom: 15px; color: rgba(255,255,255,0.85);">📚 คอร์สที่ฉันลงทะเบียนไว้</h3>
            <div class="content-box">
                <div id="my-courses"></div>
            </div>

            <!-- ความคืบหน้าล่าสุด -->
            <h3 style="margin-top: 30px; margin-bottom: 15px; color: rgba(255,255,255,0.85);">📈 ความคืบหน้าการเรียนล่าสุด</h3>
            <div class="content-box">
                <div id="my-progress"></div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student-dashboard.js"></script>
    <script>checkLogin('student')</script>
</body>
</html>
