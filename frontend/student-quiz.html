<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Boo</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="student-body">

    <!-- Student Navbar -->
    <nav class="s-nav">
        <div class="s-nav-logo">🎓 <span>Course Boo</span></div>
        <div class="s-nav-links">
            <a href="student-dashboard.html">🏠 หน้าหลัก</a>
            <a href="student-courses.html">📚 คอร์สของฉัน</a>
            <a href="student-progress.html">📈 ความคืบหน้า</a>
            <a href="student-quiz.html" class="s-nav-active">📝 แบบทดสอบ</a>
            
        </div>
        <button class="s-nav-logout" onclick="logout()">🚪 ออก</button>
    </nav>

    <!-- Main -->
    <div class="s-main">
        <div class="header-section">
                <h1 style="margin: 0; font-size: 24px; padding-bottom: 20px;">
                    แบบทดสอบ <small style="color: rgba(255,255,255,0.42); font-size: 15px; font-weight: normal;">เลือกบทเรียนแล้วทำข้อสอบได้เลย</small>
                </h1>
            </div>

            <!-- เลือกคอร์สและบทเรียน -->
            <div class="content-box" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label>เลือกคอร์สที่ลงทะเบียนไว้</label>
                    <select class="form-control" name="course_id" onchange="loadLessons()">
                        <option value="">-- เลือกคอร์ส --</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>เลือกบทเรียน</label>
                    <select class="form-control" name="lesson_id" onchange="loadQuizzes()">
                        <option value="">-- เลือกบทเรียน --</option>
                    </select>
                </div>
            </div>

            <!-- คะแนน -->
            <div id="score-box" style="display:none;" class="score-box">
                <div class="score-number" id="score-text">0/0</div>
                <p style="color: rgba(255,255,255,0.42); margin: 5px 0 0 0;">คะแนนที่ได้</p>
            </div>

            <!-- ข้อสอบ -->
            <div id="quiz-container"></div>

            <!-- ปุ่มส่งคำตอบ -->
            <div id="submit-section" style="display:none; text-align: center; margin-top: 20px;">
                <button onclick="submitAllAnswers()" class="btn-submit" style="padding: 12px 40px; font-size: 16px;">
                    📝 ส่งคำตอบทั้งหมด
                </button>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student-quiz.js"></script>
    <script>checkLogin('student')</script>
</body>
</html>
