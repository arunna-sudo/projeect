<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracking</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* override local — dark theme ใช้ CSS หลักแทน */
        .progress-item {
            background-color: transparent;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #FF9800;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
        }
        .status-learning {
            background-color: rgba(245,158,11,0.15);
            color: #fbbf24;
        }
        .status-completed {
            background-color: rgba(16,185,129,0.15);
            color: #34d399;
        }
        .btn-success {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-success:hover { background-color: #45a049; }
    </style>
</head>
<body class="teacher-body">
<!--
    หน้า   : ติดตามการเรียน
    หน้าที่ : บันทึกและดูความคืบหน้าการเรียนของนักเรียนแต่ละคน
-->

    <div class="admin-layout">

        <div class="sidebar">
            <div class="sidebar-header">🎓 Course Boo</div>
                    <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 ภาพรวมระบบ</a></li>
                <li><a href="course.html">📚 จัดการคอร์ส</a></li>
                <li><a href="instructor.html">👨‍🏫 จัดการผู้สอน</a></li>
                <li><a href="lesson.html">📝 จัดการบทเรียน</a></li>
                <li><a href="student.html">🎓 จัดการผู้เรียน</a></li>
                <li><a href="enrollment.html">🔗 การลงทะเบียน</a></li>
                <li class="active"><a href="progress.html">📈 ติดตามการเรียน</a></li>
                <li><a href="quiz.html">📋 แบบทดสอบ</a></li>
                <li><a href="quiz-results.html">🏆 คะแนนแบบทดสอบ</a></li>
                <li style="border-top: 1px solid rgba(255,255,255,0.06);">
                    <a href="#" onclick="logout()">🚪 ออกจากระบบ</a>
                </li>
            </ul>
        </div>

        <div class="main-content">
            <div class="header-section">
                <h1 style="margin: 0; font-size: 24px; padding-bottom: 20px;">
                    ติดตามการเรียน <small style="font-size: 15px; font-weight: normal; color: inherit; opacity: 0.45;">ดูความคืบหน้าการเรียนของนักเรียน</small>
                </h1>
            </div>

            <div style="display: flex; gap: 25px; align-items: flex-start;">

                <div class="content-box" style="flex: 1;">
                    <h3 style="margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;">📝 บันทึกการเข้าเรียน</h3>

                    <div class="form-group">
                        <label>ใครกำลังเรียน? (Student)</label>
                        <select class="form-control" name="student_id" onchange="loadStudentCourses()">
                            <option value="">-- เลือกผู้เรียน --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>เรียนคอร์สไหน? (Course)</label>
                        <select class="form-control" name="course_id" disabled onchange="loadCourseLessons()">
                            <option value="">-- กรุณาเลือกผู้เรียนก่อน --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>เรียนบทไหน? (Lesson)</label>
                        <select class="form-control" name="lesson_id" disabled>
                            <option value="">-- กรุณาเลือกคอร์สก่อน --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>สถานะตอนเริ่ม</label>
                        <select class="form-control" name="is_completed">
                            <option value="false">เพิ่งเริ่มเรียน (ยังไม่จบ)</option>
                            <option value="true">เรียนจบแล้วทันที</option>
                        </select>
                    </div>

                    <div id="message" class="message"></div>

                    <div style="text-align: right; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                        <button onclick="submitData()" class="btn-submit">💾 บันทึกประวัติการเข้าเรียน</button>
                    </div>
                </div>

                <div class="content-box" style="flex: 2;">
                    <h3 style="margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;">📋 ประวัติการเรียนของทุกคน</h3>
                    <div id="progress-data"></div>
                </div>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/progress.js"></script>
    <script>checkLogin('teacher');</script>
</body>
</html>
