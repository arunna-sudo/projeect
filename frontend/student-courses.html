<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอร์สของฉัน</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* === Modal Popup === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 720px;
            max-height: 88vh;
            overflow-y: auto;
            position: relative;
            border-top: 4px solid #3c8dbc;
        }

        .modal-close {
            position: absolute;
            top: 12px; right: 12px;
            background: #dd4b39;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            line-height: 32px;
            text-align: center;
        }

        /* วิดีโอ 16:9 */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin-bottom: 18px;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        /* PDF box */
        .pdf-box {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .pdf-box a {
            color: #e65100;
            font-weight: bold;
            text-decoration: none;
        }
        .pdf-box a:hover { text-decoration: underline; }

        /* content text */
        .modal-content-text {
            font-size: 15px;
            color: #444;
            line-height: 1.9;
            white-space: pre-wrap;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #3c8dbc;
        }

        /* Course sections */
        .course-section {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }
        .course-section-header {
            background: #3c8dbc;
            color: white;
            padding: 13px 18px;
            font-size: 16px;
            font-weight: bold;
        }
        .lesson-item {
            padding: 13px 18px;
            border-bottom: 1px solid #f4f4f4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lesson-item:last-child { border-bottom: none; }

        .btn-view {
            background-color: #3c8dbc;
            color: white;
            border: none;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .btn-view:hover { background-color: #367fa9; }
    </style>
</head>
<body style="background-color: #ecf0f5; margin: 0;">
    <div class="admin-layout">
        <div class="sidebar">
            <div class="sidebar-header">🎓 Course Boo</div>
            <ul class="sidebar-menu">
                <li><a href="student-dashboard.html">📊 หน้าหลัก</a></li>
                <li class="active"><a href="student-courses.html">📚 คอร์สของฉัน</a></li>
                <li><a href="student-progress.html">📈 ความคืบหน้า</a></li>
                <li><a href="student-quiz.html">📋 แบบทดสอบ</a></li>
                <li style="border-top: 1px solid #3d4f56;">
                    <a href="#" onclick="logout()">🚪 ออกจากระบบ</a>
                </li>
            </ul>
        </div>

        <div class="main-content">
            <div class="header-section">
                <h1 style="margin: 0; font-size: 24px; padding-bottom: 20px;">
                    คอร์สของฉัน
                    <small style="color: #777; font-size: 15px; font-weight: normal;">กด "ดูเนื้อหา" เพื่อเรียนแต่ละบทเรียน</small>
                </h1>
            </div>
            <div id="my-courses">
                <p style="text-align:center; color:gray;">กำลังโหลด...</p>
            </div>
        </div>
    </div>

    <!-- === Popup Modal === -->
    <div class="modal-overlay" id="lesson-modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 id="modal-title" style="margin: 0 0 18px 0; color: #333; font-size: 20px; padding-right: 30px;"></h2>
            <div id="modal-video"></div>
            <div id="modal-pdf"></div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student-courses.js"></script>
    <script>checkLogin('student')</script>
</body>
</html>
