<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Boo</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="student-body">

    <!-- Student Navbar -->
    <nav class="s-nav">
        <div class="s-nav-logo">🎓 <span>Course Boo</span></div>
        <div class="s-nav-links">
            <a href="student-dashboard.html">🏠 หน้าหลัก</a>
            <a href="student-courses.html">📚 คอร์สของฉัน</a>
            <a href="student-progress.html" class="s-nav-active">📈 ความคืบหน้า</a>
            <a href="student-quiz.html">📝 แบบทดสอบ</a>
            
        </div>
        <button class="s-nav-logout" onclick="logout()">🚪 ออก</button>
    </nav>

    <!-- Main -->
    <div class="s-main">
        <div class="header-section">
                <h1 style="margin: 0; font-size: 24px; padding-bottom: 20px;">
                    ความคืบหน้าการเรียน <small style="color: rgba(255,255,255,0.42); font-size: 15px; font-weight: normal;">ติดตามการเรียนของคุณ</small>
                </h1>
            </div>

            <!-- stat cards -->
            <div class="stat-grid" style="margin-bottom: 25px;">
                <div class="stat-card bg-green">
                    <div>
                        <h3 id="count-completed">0</h3>
                        <p>บทเรียนที่เรียนจบ</p>
                    </div>
                    <div class="stat-icon">✅</div>
                </div>
                <div class="stat-card bg-orange">
                    <div>
                        <h3 id="count-inprogress">0</h3>
                        <p>บทเรียนที่กำลังเรียน</p>
                    </div>
                    <div class="stat-icon">⏳</div>
                </div>
            </div>

            <div class="content-box">
                <h3 style="margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px;">📈 ประวัติการเรียนทั้งหมด</h3>
                <div id="my-progress"></div>
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student-progress.js"></script>
    <script>checkLogin('student')</script>
</body>
</html>
